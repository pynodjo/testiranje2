<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Coordinates</title>
    <style>
        button {
            background-color: #87CEEB;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover {
            background-color: #00BFFF;
        }
        .spacer {
            height: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>Pojedinačna pretraga</h1>

    <h2>Pretraga po šifri mjernog mjesta</h2>
    <form id="sifra-form">
        <label for="sifra">Unesite šifru mjernog mjesta i kliknite Pretraga:</label>
        <input type="text" id="sifra" name="sifra" required>
        <button type="submit">Pretraga</button>
    </form>
    <div id="result-sifra"></div>

    <h2>Pretraga po serijskom broju brojila</h2>
    <form id="serijski_broj-form">
        <label for="serijski_broj">Unesite serijski broj brojila i kliknite Pretraga:</label>
        <input type="text" id="serijski_broj" name="serijski_broj" required>
        <button type="submit">Pretraga</button>
    </form>
    <div id="result-serijski_broj"></div>

    <div class="spacer"></div>
    <button onclick="window.location.reload();">Osvježi</button>
    <div class="spacer"></div>

    <script>
        function displayResult(data, resultDiv) {
            if (data.url) {
                let html = '<p>Lokacija: <a href="' + data.url + '" target="_blank">Google Maps link</a></p>';
                if (data.additional_info) {
                    html += '<table>';
                    for (const [key, value] of Object.entries(data.additional_info)) {
                        html += `<tr><th>${key}</th><td>${value}</td></tr>`;
                    }
                    html += '</table>';
                }
                resultDiv.innerHTML = html;
            } else {
                resultDiv.textContent = data.error;
            }
        }

        document.getElementById('sifra-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const sifra = document.getElementById('sifra').value;
            fetch('/get_coordinates_by_sifra', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `sifra=${sifra}`
            })
            .then(response => response.json())
            .then(data => {
                const resultDiv = document.getElementById('result-sifra');
                displayResult(data, resultDiv);
            });
        });

        document.getElementById('serijski_broj-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const serijski_broj = document.getElementById('serijski_broj').value;
            fetch('/get_coordinates_by_serijski_broj', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `serijski_broj=${serijski_broj}`
            })
            .then(response => response.json())
            .then(data => {
                const resultDiv = document.getElementById('result-serijski_broj');
                displayResult(data, resultDiv);
            });
        });
    </script>

    <footer>
        <p>&copy; 2024 Developed by [Your Name]. Last updated: 10.9.2024.</p>
    </footer>
</body>
</html>
